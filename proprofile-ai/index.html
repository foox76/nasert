<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProProfile AI - Corporate Profile Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#0f172a', // Slate 900
              secondary: '#334155', // Slate 700
              accent: '#0ea5e9', // Sky 500
              gold: '#ca8a04', // Yellow 600
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            screens: {
              print: { raw: 'print' },
            },
          },
        },
      }
    </script>
    <style>
      /* Critical Print Styles */
      @media print {
        @page {
          size: A4;
          margin: 0;
        }
        body {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          background-color: white !important;
        }
        .no-print {
          display: none !important;
        }
        .print-page-break {
          break-after: page;
          page-break-after: always;
        }
        /* Ensure layout remains consistent in print */
        .print-container {
          width: 100% !important;
          height: 100% !important;
          overflow: visible !important;
        }
      }
      
      /* A4 Dimensions for Screen Preview */
      .a4-page {
        width: 210mm;
        height: 297mm;
        margin: 0 auto;
        background: white;
        position: relative;
        overflow: hidden;
      }
      
      /* Webkit scrollbar styling for the form side */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>

  }
}
</script>
